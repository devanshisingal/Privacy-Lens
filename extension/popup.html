<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>PrivacyLens</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      width: 300px;
      margin: 0;
      padding: 16px;
      background-color: #0b0f19;
      color: #e2e8f0;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #1e293b;
    }
    .logo {
      width: 24px;
      height: 24px;
      background-color: #6366f1;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: white;
    }
    h1 {
      font-size: 16px;
      margin: 0;
      font-weight: 600;
    }
    .metric {
      background: #1e293b;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .metric-title {
      font-size: 13px;
      color: #94a3b8;
    }
    .metric-value {
      font-size: 18px;
      font-weight: bold;
      font-family: monospace;
    }
    .text-red { color: #ef4444; }
    .text-green { color: #10b981; }
    .text-blue { color: #3b82f6; }
    
    .btn {
      display: block;
      width: 100%;
      padding: 10px;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 6px;
      font-weight: 500;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      margin-top: 16px;
    }
    .btn:hover {
      background: #4338ca;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">P</div>
    <h1>PrivacyLens Live</h1>
  </div>
  
  <div class="metric">
    <span class="metric-title">Active Trackers</span>
    <span class="metric-value text-red" id="trackerCount">0</span>
  </div>
  
  <div class="metric">
    <span class="metric-title">Current Risk Score</span>
    <span class="metric-value text-blue" id="riskScore">--</span>
  </div>
  
  <a href="http://localhost:3000" target="_blank" class="btn">Open Observatory Dashboard</a>
  
  <script src="popup.js"></script>
</body>
</html>
